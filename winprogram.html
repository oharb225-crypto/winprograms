<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>WinPrograms - متجر الألعاب والبرامج</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;}
header{background:#020617;padding:20px;font-size:34px;text-align:center;font-weight:bold;}
.search{text-align:center;margin:20px;}
input{padding:12px;width:350px;border-radius:10px;border:none;font-size:16px;}
.section{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;}
.card{background:#1e293b;padding:15px;border-radius:12px;text-align:center;}
.card img{width:100%;height:120px;object-fit:cover;border-radius:8px;}
.card h3{margin:8px 0;}
.card p{margin:4px 0;font-size:14px;color:#cbd5e1;}
.card a{display:inline-block;margin-top:6px;background:#2563eb;padding:6px 12px;border-radius:8px;color:white;text-decoration:none;}
.card a:hover{background:#1d4ed8;}
.stars{color:gold;margin:5px 0;}
h2{padding-left:20px;}
</style>
</head>
<body>

<header>💻 WinPrograms</header>

<div class="search">
<input type="text" id="search" placeholder="ابحث عن لعبة أو برنامج">
</div>

<div class="section">
<h2>🎮 الألعاب</h2>
<div class="grid" id="games"></div>
</div>

<div class="section">
<h2>💻 برامج ويندوز</h2>
<div class="grid" id="apps"></div>
</div>

<div class="section">
<h2>🌐 مواقع مفيدة</h2>
<div class="grid" id="sites"></div>
</div>

<script>
// ---------- بيانات الألعاب 70 لعبة ----------
const games=[
["Fortnite","https://www.epicgames.com/fortnite","باتل رويال","https://cdn2.unrealengine.com/Fortnite-Thumbnail-1920x1080-90191d4a0f0e.jpg",5],
["Rocket League","https://www.rocketleague.com/","كرة سيارات","https://www.rocketleague.com/content/dam/rocketleague/homepage/rocketleague_thumb.jpg",4.8],
["Genshin Impact","https://genshin.hoyoverse.com/","تقنيات RPG","https://uploadstatic-sea.mihoyo.com/contentweb/20230628/2023062816444529943.jpg",4.9],
["Arknights: Endfield","https://store.epicgames.com/","استراتيجية","https://cdn.cloudflare.steamstatic.com/steam/apps/1862640/header.jpg",4.7],
["Zenless Zone Zero","https://store.epicgames.com/","أكشن","https://cdn.cloudflare.steamstatic.com/steam/apps/2054730/header.jpg",4.6],
["Honkai: Star Rail","https://store.epicgames.com/","RPG","https://cdn.cloudflare.steamstatic.com/steam/apps/2080470/header.jpg",4.7],
["VALORANT","https://playvalorant.com/","تصويب","https://uploadstatic-sea.mihoyo.com/contentweb/20230628/2023062816444529943.jpg",4.9],
["The Sims 4","https://www.ea.com/games/the-sims/the-sims-4","محاكاة حياة","https://cdn1.ea.com/images/2023/the-sims-4/ts4_thumbnail.jpg",4.8],
["Fall Guys","https://fallguys.com/","منافسة","https://cdn1.epicgames.com/fallguys/homepage/fallguys_thumb.jpg",4.7],
["Marvel Rivals","https://www.marvelrivals.com/","أكشن","https://cdn.marvel.com/rivals_thumb.jpg",4.6]
// أكمل بنفس الصيغة حتى 70 لعبة
];

// ---------- بيانات البرامج 70 برنامج ----------
const apps=[
["VLC Media Player","https://www.videolan.org/vlc/","مشغل فيديو","https://upload.wikimedia.org/wikipedia/commons/9/9e/VLC_icon.svg",5],
["7-Zip","https://www.7-zip.org/","ضغط ملفات","https://upload.wikimedia.org/wikipedia/commons/3/3f/7zip_logo.svg",4.8],
["OBS Studio","https://obsproject.com/","تصوير وبث","https://upload.wikimedia.org/wikipedia/commons/2/2d/OBS_Studio_Logo.svg",4.9],
["Blender","https://www.blender.org/","تصميم 3D","https://upload.wikimedia.org/wikipedia/commons/0/0c/Blender_logo_no_text.svg",4.7],
["GIMP","https://www.gimp.org/","تصميم وصور","https://upload.wikimedia.org/wikipedia/commons/4/45/GIMP_icon.svg",4.6],
["Notepad++","https://notepad-plus-plus.org/","تحرير نصوص","https://upload.wikimedia.org/wikipedia/commons/3/3e/Notepad%2B%2B_logo.svg",4.8],
["LibreOffice","https://www.libreoffice.org/","أوفيس مجاني","https://upload.wikimedia.org/wikipedia/commons/3/3e/LibreOffice_Logo.svg",4.7],
["Mozilla Firefox","https://www.mozilla.org/firefox/","متصفح","https://upload.wikimedia.org/wikipedia/commons/a/a0/Firefox_logo,_2019.png",4.7],
["Google Chrome","https://www.google.com/chrome/","متصفح","https://upload.wikimedia.org/wikipedia/commons/8/87/Google_Chrome_icon_(September_2014).svg",4.8],
["qBittorrent","https://www.qbittorrent.org/","تحميل تورنت","https://upload.wikimedia.org/wikipedia/commons/3/3e/QBittorrent_logo.svg",4.6]
// أكمل بنفس الصيغة حتى 70 برنامج
];

// ---------- 10 مواقع مفيدة ----------
const sites=[
["YouTube","https://youtube.com"],
["Google","https://google.com"],
["GitHub","https://github.com"],
["Wikipedia","https://wikipedia.org"],
["Stack Overflow","https://stackoverflow.com"],
["Canva","https://canva.com"],
["Photopea","https://photopea.com"],
["Pixabay","https://pixabay.com"],
["Freepik","https://freepik.com"],
["ChatGPT","https://chat.openai.com"]
];

// ---------- إنشاء كروت ----------
function createCards(list,container){
list.forEach(item=>{
let card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${item[3]}" alt="${item[0]}">
<h3>${item[0]}</h3>
<p>${item[2]}</p>
<div class="stars">${"★".repeat(Math.round(item[4]))}</div>
<a href="${item[1]}" target="_blank">تحميل</a>`;
container.appendChild(card);
});
}

function createSites(list,container){
list.forEach(s=>{
let card=document.createElement("div");
card.className="card";
card.innerHTML=`<h3>${s[0]}</h3><a href="${s[1]}" target="_blank">Open</a>`;
container.appendChild(card);
});
}

// إنشاء العناصر
createCards(games,document.getElementById("games"));
createCards(apps,document.getElementById("apps"));
createSites(sites,document.getElementById("sites"));

// ---------- البحث ----------
const searchInput=document.getElementById("search");
searchInput.addEventListener("keyup",function(){
let filter=searchInput.value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
if(card.textContent.toLowerCase().includes(filter)){
card.style.display="";
}else{
card.style.display="none";
}
});
});
</script>

</body>
</html>
